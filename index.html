<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#00263A">
<title>CRM · Water Please</title>
<link rel="icon" href="simbolo-verde.png">
<link rel="apple-touch-icon" href="simbolo-verde.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@font-face{font-family:'Chubbo';src:url('fonts/chubbo-700.woff2') format('woff2');font-weight:700;font-display:swap}
@font-face{font-family:'Hanken';src:url('fonts/hanken-400.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Hanken';src:url('fonts/hanken-600.woff2') format('woff2');font-weight:600;font-display:swap}
@font-face{font-family:'Hanken';src:url('fonts/hanken-700.woff2') format('woff2');font-weight:700;font-display:swap}
:root{
  --navy:#00263A;--navy2:#0b3049;--green:#26D07C;--green-d:#0f9e60;--menta:#C8EED5;
  --ink:#eaf6ef;--muted:#93aab7;--line:rgba(255,255,255,.10);--card:rgba(255,255,255,.05);
  --blue:#3aa0ff;--yellow:#FFB600;--lilac:#C7A0CE;--red:#ff6b7a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Hanken',sans-serif;color:var(--ink);
  background:radial-gradient(1100px 700px at 85% -8%,#013a54,transparent 55%),var(--navy);
  -webkit-font-smoothing:antialiased}
h1,h2,h3,.chubbo,.num{font-family:'Chubbo',sans-serif;font-weight:700;letter-spacing:-.01em}
.app{max-width:560px;margin:0 auto;min-height:100%;padding-bottom:96px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
a{color:var(--green)}

/* header */
.hd{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:11px;padding:16px;
  padding-top:calc(16px + env(safe-area-inset-top));
  background:linear-gradient(to bottom,var(--navy) 72%,transparent);backdrop-filter:blur(6px)}
.hd img{width:34px}
.hd .t b{font-family:'Chubbo';font-size:18px;display:block;line-height:.95}
.hd .t span{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--green)}
.sync{margin-left:auto;font-size:11px;font-weight:700;padding:5px 10px;border-radius:100px;display:flex;align-items:center;gap:6px}
.sync.on{background:rgba(38,208,124,.14);color:var(--green)}
.sync.off{background:rgba(255,182,0,.13);color:var(--yellow)}
.sync .d{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 7px currentColor}

.view{padding:4px 16px}
.vtitle{font-family:'Chubbo';font-size:26px;margin:6px 0 4px}
.vsub{color:var(--muted);font-size:13px;margin-bottom:16px}

/* search */
.search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:12px 14px;color:var(--ink);margin-bottom:14px}
.search::placeholder{color:var(--muted)}

/* lead card */
.lead{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:16px;padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:.12s}
.lead:active{transform:scale(.985);background:rgba(38,208,124,.08)}
.av{flex:0 0 auto;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-family:'Chubbo';font-size:18px;color:var(--navy);background:var(--green)}
.lead .info{flex:1;min-width:0}
.lead .info b{font-size:15.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead .info s{font-size:12.5px;color:var(--muted);text-decoration:none}
.pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:4px 9px;border-radius:100px;white-space:nowrap}

/* pipeline */
.stage{margin-bottom:20px}
.stage .sh{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.stage .sh b{font-family:'Chubbo';font-size:16px}
.stage .sh .cnt{font-size:12px;color:var(--muted);font-weight:700}
.stage .sh .bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.08)}
.dotc{width:10px;height:10px;border-radius:50%}
.empty{color:var(--muted);font-size:13px;padding:8px 2px}

/* KPIs */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:8px}
.kc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px}
.kc .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
.kc .v{font-family:'Chubbo';font-size:34px;color:#fff;margin-top:5px;line-height:1}
.kc .v small{font-size:15px;color:var(--muted)}
.kbars{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
.krow{display:flex;align-items:center;gap:10px;margin:11px 0;font-size:13px}
.krow .kbar{flex:1;height:8px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
.krow .kbar i{display:block;height:100%;border-radius:5px}
.krow .kn{font-weight:700;width:26px;text-align:right}
.krow .kt{width:96px}

/* FAB + bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;justify-content:center;
  background:linear-gradient(to top,var(--navy) 62%,transparent);padding:8px 0 calc(10px + env(safe-area-inset-bottom))}
.navin{display:flex;align-items:center;gap:4px;background:var(--navy2);border:1px solid var(--line);
  border-radius:100px;padding:6px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.navb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 15px;border-radius:100px;color:var(--muted);font-size:10px;font-weight:700}
.navb.on{color:var(--green);background:rgba(38,208,124,.12)}
.navb svg{width:22px;height:22px}
.fab{width:52px;height:52px;border-radius:50%;background:var(--green);color:var(--navy);display:flex;
  align-items:center;justify-content:center;margin:0 4px;box-shadow:0 6px 18px rgba(38,208,124,.4)}
.fab svg{width:26px;height:26px}

/* overlay */
.ov{position:fixed;inset:0;z-index:40;background:var(--navy);overflow-y:auto;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  padding-bottom:40px}
.ov.show{transform:translateY(0)}
.ovh{position:sticky;top:0;background:var(--navy);display:flex;align-items:center;gap:12px;
  padding:16px;padding-top:calc(16px + env(safe-area-inset-top));border-bottom:1px solid var(--line);z-index:2}
.ovh .x{font-size:26px;line-height:1;color:var(--muted);width:34px}
.ovh b{font-family:'Chubbo';font-size:19px}
.ovh .del{margin-left:auto;color:var(--red);font-size:13px;font-weight:700}
.ovbody{padding:18px 16px;max-width:560px;margin:0 auto}

/* form */
.fld{margin-bottom:15px}
.fld label{display:block;font-size:12.5px;font-weight:700;color:var(--menta);margin-bottom:6px;letter-spacing:.02em}
.fld input,.fld select,.fld textarea{width:100%;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:13px 14px;color:var(--ink)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--green)}
.fld textarea{min-height:80px;resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.stagepick{display:flex;flex-wrap:wrap;gap:8px}
.stagepick button{padding:9px 14px;border-radius:100px;border:1.5px solid var(--line);font-size:13px;font-weight:700;color:var(--muted)}
.stagepick button.sel{color:var(--navy)}
.btn{width:100%;padding:15px;border-radius:14px;background:var(--green);color:var(--navy);font-weight:700;font-size:15.5px;font-family:'Chubbo';margin-top:6px}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn.wpp{background:#25D366;color:#052e16}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin:14px 0 18px}
.act{padding:13px 6px;border-radius:14px;background:var(--card);border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--ink)}
.act svg{width:22px;height:22px;color:var(--green)}

/* notes */
.note{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px}
.note .nt{font-size:11px;color:var(--muted);margin-bottom:3px}
.note .nx{font-size:14px;line-height:1.4}
.detrow{display:flex;justify-content:space-between;padding:12px 2px;border-bottom:1px solid var(--line);font-size:14.5px}
.detrow span{color:var(--muted)}
.detrow b{font-weight:700;text-align:right}

.sechd{font-family:'Chubbo';font-size:15px;color:var(--menta);margin:20px 0 10px}
.hint{font-size:12.5px;color:var(--muted);line-height:1.55;margin-top:8px}
.code{background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:12px;padding:12px;
  font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.5;color:var(--menta);
  white-space:pre;overflow-x:auto;margin:8px 0}
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);z-index:60;
  background:var(--green);color:var(--navy);font-weight:700;font-size:14px;padding:11px 20px;border-radius:100px;
  opacity:0;transition:.25s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.wm{text-align:center;color:var(--muted);font-size:11px;margin:26px 0 8px}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <img src="simbolo-verde.png" alt="">
    <div class="t"><b>CRM</b><span>Water Please</span></div>
    <div class="sync off" id="sync"><span class="d"></span><span id="synct">Local</span></div>
  </div>
  <div id="view" class="view"></div>
</div>

<div class="nav"><div class="navin">
  <button class="navb on" data-nav="pipeline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Funil</button>
  <button class="navb" data-nav="leads"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>Leads</button>
  <button class="fab" id="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></button>
  <button class="navb" data-nav="kpis"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>KPIs</button>
  <button class="navb" data-nav="ajustes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>Ajustes</button>
</div></div>

<div class="ov" id="ov"><div id="ovc"></div></div>
<div class="toast" id="toast"></div>

<script>
const STAGES=[
 {k:'novo',t:'Novo',c:'#3aa0ff'},
 {k:'contactado',t:'Contactado',c:'#FFB600'},
 {k:'proposta',t:'Proposta',c:'#C7A0CE'},
 {k:'ganho',t:'Ganho',c:'#26D07C'},
 {k:'perdido',t:'Perdido',c:'#8798a3'},
];
const stageMap=Object.fromEntries(STAGES.map(s=>[s.k,s]));
const ORIGENS=['Site','Instagram','WhatsApp','Indicação','Feira','Manual'];
const ESPACOS=['Casa','Clínica / saúde','Ginásio','Hotel','Restauração','Escritório','Outro'];
const EQUIP=['ROH2ICE','Garrafa H₂','Ultra Detox H₂','Garrafas personalizadas','Ainda não sei'];

// ---------- data layer ----------
const DB={
  supa:null, synced:false,
  init(){
    const url=localStorage.getItem('supa_url'), key=localStorage.getItem('supa_key');
    if(url&&key&&window.supabase){ try{ this.supa=window.supabase.createClient(url,key); this.synced=true; }catch(e){ this.synced=false; } }
  },
  _local(){ return JSON.parse(localStorage.getItem('wp_leads')||'[]'); },
  _saveLocal(a){ localStorage.setItem('wp_leads',JSON.stringify(a)); },
  async all(){
    if(this.synced){ const{data,error}=await this.supa.from('leads').select('*').order('created_at',{ascending:false}); if(error)throw error; return data||[]; }
    return this._local().sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
  },
  async add(l){
    l.created_at=new Date().toISOString(); l.notas=l.notas||[];
    if(this.synced){ const{data,error}=await this.supa.from('leads').insert(l).select().single(); if(error)throw error; return data; }
    l.id=(crypto.randomUUID?crypto.randomUUID():'id'+Date.now()); const a=this._local(); a.push(l); this._saveLocal(a); return l;
  },
  async update(id,patch){
    if(this.synced){ const{error}=await this.supa.from('leads').update(patch).eq('id',id); if(error)throw error; return; }
    const a=this._local(); const i=a.findIndex(x=>x.id===id); if(i>=0){ a[i]=Object.assign(a[i],patch); this._saveLocal(a);} },
  async remove(id){
    if(this.synced){ const{error}=await this.supa.from('leads').delete().eq('id',id); if(error)throw error; return; }
    this._saveLocal(this._local().filter(x=>x.id!==id)); },
};

let LEADS=[], q='';
async function load(){ try{ LEADS=await DB.all(); }catch(e){ toast('Erro a ler dados'); LEADS=[]; } paintSync(); }
function paintSync(){ const el=document.getElementById('sync'); const t=document.getElementById('synct');
  if(DB.synced){ el.className='sync on'; t.textContent='Sincronizado'; } else { el.className='sync off'; t.textContent='Local'; } }

// ---------- helpers ----------
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials=n=>{n=(n||'?').trim();const p=n.split(/\s+/);return((p[0]||'?')[0]+(p.length>1?p[p.length-1][0]:'')).toUpperCase();};
const fmtDate=iso=>{if(!iso)return'';const d=new Date(iso);const m=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];return d.getDate()+' '+m[d.getMonth()];};
const money=v=>{v=Number(v)||0;return v?('€'+v.toLocaleString('pt-PT')):'';};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),1800);}
function filtered(){ if(!q)return LEADS; const s=q.toLowerCase(); return LEADS.filter(l=>((l.nome||'')+(l.telefone||'')+(l.email||'')+(l.espaco||'')).toLowerCase().includes(s)); }

// ---------- views ----------
let current='pipeline';
function go(v){ current=v; document.querySelectorAll('.navb').forEach(b=>b.classList.toggle('on',b.dataset.nav===v)); render(); }
function render(){ ({pipeline:vPipeline,leads:vLeads,kpis:vKpis,ajustes:vAjustes}[current])(); }

function leadCard(l){ const st=stageMap[l.estado]||STAGES[0];
  return `<div class="lead" onclick="openLead('${l.id}')">
    <div class="av">${esc(initials(l.nome))}</div>
    <div class="info"><b>${esc(l.nome||'Sem nome')}</b><s>${esc(l.espaco||'—')}${l.telefone?' · '+esc(l.telefone):''}</s></div>
    <div style="text-align:right"><div class="pill" style="background:${st.c}22;color:${st.c}">${st.t}</div>
    ${l.valor?`<div style="font-size:12px;color:var(--muted);margin-top:5px;font-weight:700">${money(l.valor)}</div>`:''}</div>
  </div>`; }

function vPipeline(){
  const v=document.getElementById('view');
  let h=`<div class="vtitle">Funil</div><div class="vsub">${LEADS.length} lead${LEADS.length===1?'':'s'} · toca para abrir</div>`;
  STAGES.forEach(s=>{ const items=LEADS.filter(l=>(l.estado||'novo')===s.k);
    h+=`<div class="stage"><div class="sh"><span class="dotc" style="background:${s.c}"></span><b>${s.t}</b><span class="cnt">${items.length}</span><span class="bar"></span></div>`;
    h+= items.length? items.map(leadCard).join('') : `<div class="empty">Sem leads aqui.</div>`;
    h+=`</div>`; });
  v.innerHTML=h;
}
function vLeads(){
  const v=document.getElementById('view');
  const list=filtered();
  v.innerHTML=`<div class="vtitle">Leads</div>
    <input class="search" id="q" placeholder="Procurar nome, telefone, espaço…" value="${esc(q)}">
    <div id="list">${list.length?list.map(leadCard).join(''):'<div class="empty">Sem resultados. Toca no + para adicionar.</div>'}</div>`;
  const qi=document.getElementById('q'); qi.oninput=()=>{q=qi.value;document.getElementById('list').innerHTML=filtered().map(leadCard).join('')||'<div class="empty">Sem resultados.</div>';};
}
function vKpis(){
  const v=document.getElementById('view');
  const total=LEADS.length;
  const ganho=LEADS.filter(l=>l.estado==='ganho');
  const perdido=LEADS.filter(l=>l.estado==='perdido').length;
  const ativos=LEADS.filter(l=>!['ganho','perdido'].includes(l.estado)).length;
  const receita=ganho.reduce((s,l)=>s+(Number(l.valor)||0),0);
  const pot=LEADS.filter(l=>!['ganho','perdido'].includes(l.estado)).reduce((s,l)=>s+(Number(l.valor)||0),0);
  const fechados=ganho.length+perdido; const taxa=fechados?Math.round(ganho.length/fechados*100):0;
  let bars=STAGES.map(s=>{const n=LEADS.filter(l=>(l.estado||'novo')===s.k).length;const pct=total?n/total*100:0;
    return `<div class="krow"><span class="kt">${s.t}</span><span class="kbar"><i style="width:${pct}%;background:${s.c}"></i></span><span class="kn">${n}</span></div>`;}).join('');
  v.innerHTML=`<div class="vtitle">KPIs</div><div class="vsub">Water Please · visão geral</div>
    <div class="kgrid">
      <div class="kc"><div class="k">Leads ativos</div><div class="v">${ativos}</div></div>
      <div class="kc"><div class="k">Ganhos</div><div class="v" style="color:var(--green)">${ganho.length}</div></div>
      <div class="kc"><div class="k">Taxa de ganho</div><div class="v">${taxa}<small>%</small></div></div>
      <div class="kc"><div class="k">Receita ganha</div><div class="v">${receita?money(receita):'€0'}</div></div>
    </div>
    <div class="kc" style="margin-top:11px"><div class="k">Potencial no funil</div><div class="v">${pot?money(pot):'€0'}</div></div>
    <div class="kbars"><div class="k" style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px">Leads por fase</div>${bars}</div>`;
}
function vAjustes(){
  const v=document.getElementById('view');
  const url=localStorage.getItem('supa_url')||'', key=localStorage.getItem('supa_key')||'';
  const sql=`create table leads (
  id uuid primary key default gen_random_uuid(),
  created_at timestamptz default now(),
  nome text, telefone text, email text,
  origem text, espaco text, equipamento text,
  estado text default 'novo',
  valor numeric default 0,
  notas jsonb default '[]'::jsonb
);
alter table leads enable row level security;
create policy "acesso" on leads for all using (true) with check (true);`;
  v.innerHTML=`<div class="vtitle">Ajustes</div>
    <div class="vsub">Estado: <b style="color:${DB.synced?'var(--green)':'var(--yellow)'}">${DB.synced?'Sincronizado (Supabase)':'Local (só este aparelho)'}</b></div>
    <div class="sechd">☁️ Ligar backend (Supabase)</div>
    <div class="hint">Para os dados persistirem e sincronizarem entre telemóvel e computador, cria um projeto grátis em <b>supabase.com</b>, corre o SQL abaixo (SQL Editor) e cola aqui o URL + a chave <b>anon public</b> (Settings → API).</div>
    <div class="code">${esc(sql)}</div>
    <div class="fld" style="margin-top:14px"><label>Project URL</label><input id="su" placeholder="https://xxxx.supabase.co" value="${esc(url)}"></div>
    <div class="fld"><label>Anon public key</label><input id="sk" placeholder="eyJhbGci…" value="${esc(key)}"></div>
    <button class="btn" onclick="saveSupa()">Ligar e sincronizar</button>
    <button class="btn ghost" onclick="clearSupa()" style="margin-top:10px">Desligar backend</button>
    <div class="sechd">📦 Dados</div>
    <button class="btn ghost" onclick="exportJSON()">Exportar tudo (JSON)</button>
    <button class="btn ghost" onclick="seed()" style="margin-top:10px">Adicionar 3 leads de exemplo</button>
    <div class="hint" style="margin-top:14px">⚠️ Nota de privacidade: com a política aberta, quem tiver o link + a chave acede aos dados. Guarda o link privado. Para clientes reais, pede-me para adicionar login (Supabase Auth).</div>
    <div class="wm">Water Please · Cuida de Mim · CRM v1</div>`;
}

// ---------- lead overlay ----------
const ov=document.getElementById('ov'), ovc=document.getElementById('ovc');
function showOv(html){ ovc.innerHTML=html; ov.classList.add('show'); ov.scrollTop=0; }
function closeOv(){ ov.classList.remove('show'); }
function field(id,label,val,type='text'){return `<div class="fld"><label>${label}</label><input id="${id}" type="${type}" value="${esc(val||'')}"></div>`;}
function selField(id,label,opts,val){return `<div class="fld"><label>${label}</label><select id="${id}">${opts.map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;}

function formHTML(l,isNew){
  return `<div class="ovh"><button class="x" onclick="closeOv()">✕</button><b>${isNew?'Novo lead':'Editar'}</b>
    ${isNew?'':`<button class="del" onclick="delLead('${l.id}')">Apagar</button>`}</div>
  <div class="ovbody">
    ${field('f_nome','Nome',l.nome)}
    <div class="frow">${field('f_tel','Telefone',l.telefone,'tel')}${field('f_val','Valor (€)',l.valor,'number')}</div>
    ${field('f_email','Email',l.email,'email')}
    <div class="frow">${selField('f_orig','Origem',ORIGENS,l.origem||'Site')}${selField('f_esp','Espaço',ESPACOS,l.espaco||'Casa')}</div>
    ${selField('f_eq','Equipamento',EQUIP,l.equipamento||'Ainda não sei')}
    <div class="fld"><label>Fase</label><div class="stagepick" id="f_stage">${STAGES.map(s=>`<button data-k="${s.k}" class="${(l.estado||'novo')===s.k?'sel':''}" style="${(l.estado||'novo')===s.k?`background:${s.c};border-color:${s.c}`:''}">${s.t}</button>`).join('')}</div></div>
    ${isNew?`<div class="fld"><label>Nota inicial (opcional)</label><textarea id="f_nota" placeholder="Contexto, o que precisa…"></textarea></div>`:''}
    <button class="btn" onclick="saveLead('${isNew?'':l.id}')">${isNew?'Criar lead':'Guardar'}</button>
  </div>`;
}
let pickStage='novo';
function bindStage(cur){ pickStage=cur||'novo';
  document.querySelectorAll('#f_stage button').forEach(b=>b.onclick=()=>{pickStage=b.dataset.k;
    document.querySelectorAll('#f_stage button').forEach(x=>{const s=stageMap[x.dataset.k];const on=x.dataset.k===pickStage;
      x.className=on?'sel':'';x.style.cssText=on?`background:${s.c};border-color:${s.c}`:'';});});
}
function newLead(){ showOv(formHTML({},true)); bindStage('novo'); }
function openLead(id){ const l=LEADS.find(x=>x.id===id); if(!l)return; detailHTML(l); }

function detailHTML(l){ const st=stageMap[l.estado]||STAGES[0];
  const notas=(l.notas||[]).slice().reverse();
  const tel=(l.telefone||'').replace(/[^0-9+]/g,'');
  const wpp=tel?('https://wa.me/'+tel.replace(/^\+/,'').replace(/^0/,'351')):'';
  showOv(`<div class="ovh"><button class="x" onclick="closeOv()">✕</button><b>${esc(l.nome||'Lead')}</b>
      <button class="del" onclick="editLead('${l.id}')" style="color:var(--green)">Editar</button></div>
    <div class="ovbody">
      <div style="display:flex;align-items:center;gap:13px;margin-bottom:6px">
        <div class="av" style="width:56px;height:56px;font-size:22px">${esc(initials(l.nome))}</div>
        <div><div style="font-family:'Chubbo';font-size:22px">${esc(l.nome||'Sem nome')}</div>
        <span class="pill" style="background:${st.c}22;color:${st.c}">${st.t}</span></div>
      </div>
      <div class="actions">
        <a class="act" href="${wpp||'#'}" ${wpp?'target="_blank"':'onclick="toast(\'Sem telefone\');return false"'}><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2Zm5.4 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .1-3.2-.7-2.7-1.1-4.4-3.8-4.5-4-.1-.2-1.1-1.4-1.1-2.7s.7-1.9.9-2.1c.2-.2.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 2c.1.2.1.3 0 .5l-.4.5c-.2.2-.3.4-.1.7.2.3.9 1.4 1.9 2 .7.5 1.3.6 1.5.5.2-.1.5-.5.7-.8.2-.2.4-.2.6-.1l1.9 1c.3.1.5.2.5.3.1.2.1.7-.1 1.3Z"/></svg>WhatsApp</a>
        <a class="act" href="${tel?'tel:'+tel:'#'}" ${tel?'':'onclick="toast(\'Sem telefone\');return false"'}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"/></svg>Ligar</a>
        <a class="act" href="${l.email?'mailto:'+l.email:'#'}" ${l.email?'':'onclick="toast(\'Sem email\');return false"'}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>Email</a>
      </div>
      <div class="sechd" style="margin-top:4px">Mudar fase</div>
      <div class="stagepick" id="d_stage">${STAGES.map(s=>`<button onclick="setStage('${l.id}','${s.k}')" class="${l.estado===s.k?'sel':''}" style="${l.estado===s.k?`background:${s.c};border-color:${s.c}`:''}">${s.t}</button>`).join('')}</div>
      <div class="detrow"><span>Origem</span><b>${esc(l.origem||'—')}</b></div>
      <div class="detrow"><span>Espaço</span><b>${esc(l.espaco||'—')}</b></div>
      <div class="detrow"><span>Equipamento</span><b>${esc(l.equipamento||'—')}</b></div>
      <div class="detrow"><span>Valor</span><b>${l.valor?money(l.valor):'—'}</b></div>
      <div class="detrow"><span>Email</span><b>${esc(l.email||'—')}</b></div>
      <div class="detrow"><span>Criado</span><b>${fmtDate(l.created_at)}</b></div>
      <div class="sechd">Notas</div>
      <div class="fld"><textarea id="d_nota" placeholder="Adicionar nota…"></textarea></div>
      <button class="btn ghost" onclick="addNote('${l.id}')">+ Adicionar nota</button>
      <div style="margin-top:14px">${notas.length?notas.map(n=>`<div class="note"><div class="nt">${fmtDate(n.t)}</div><div class="nx">${esc(n.txt)}</div></div>`).join(''):'<div class="empty">Sem notas ainda.</div>'}</div>
    </div>`);
}
function editLead(id){ const l=LEADS.find(x=>x.id===id); showOv(formHTML(l,false)); bindStage(l.estado||'novo'); }

async function saveLead(id){
  const g=x=>document.getElementById(x)?document.getElementById(x).value.trim():'';
  const data={nome:g('f_nome'),telefone:g('f_tel'),email:g('f_email'),origem:g('f_orig'),
    espaco:g('f_esp'),equipamento:g('f_eq'),estado:pickStage,valor:Number(g('f_val'))||0};
  if(!data.nome){toast('Falta o nome');return;}
  try{
    if(id){ await DB.update(id,data); toast('Guardado ✓'); }
    else { const nota=g('f_nota'); if(nota)data.notas=[{t:new Date().toISOString(),txt:nota}]; await DB.add(data); toast('Lead criado ✓'); }
    closeOv(); await load(); render();
  }catch(e){ toast('Erro ao guardar'); }
}
async function setStage(id,k){ try{ await DB.update(id,{estado:k}); const l=LEADS.find(x=>x.id===id); if(l)l.estado=k; detailHTML(l); load().then(render); }catch(e){toast('Erro');} }
async function addNote(id){ const t=document.getElementById('d_nota'); const txt=t.value.trim(); if(!txt){toast('Escreve a nota');return;}
  const l=LEADS.find(x=>x.id===id); const notas=(l.notas||[]).concat([{t:new Date().toISOString(),txt}]);
  try{ await DB.update(id,{notas}); l.notas=notas; detailHTML(l); toast('Nota adicionada ✓'); load(); }catch(e){toast('Erro');} }
async function delLead(id){ if(!confirm('Apagar este lead?'))return; try{ await DB.remove(id); toast('Apagado'); closeOv(); await load(); render(); }catch(e){toast('Erro');} }

// ---------- settings actions ----------
async function saveSupa(){ const u=document.getElementById('su').value.trim(), k=document.getElementById('sk').value.trim();
  if(!u||!k){toast('Falta URL ou chave');return;}
  localStorage.setItem('supa_url',u); localStorage.setItem('supa_key',k); DB.init();
  if(!DB.synced){toast('Não liguei — verifica os dados');return;}
  try{ await DB.all(); toast('Ligado ✓ sincronizado'); await load(); go('pipeline'); }catch(e){ toast('Erro: verifica SQL/chave'); }
}
function clearSupa(){ localStorage.removeItem('supa_url'); localStorage.removeItem('supa_key'); DB.supa=null; DB.synced=false; paintSync(); toast('Backend desligado'); load().then(()=>vAjustes()); }
function exportJSON(){ const blob=new Blob([JSON.stringify(LEADS,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='water-please-crm.json'; a.click(); }

  {nome:'Ana Silva',telefone:'+351 912 000 111',email:'ana@exemplo.pt',origem:'Site',espaco:'Casa',equipamento:'ROH2ICE',estado:'novo',valor:1200},
  {nome:'Ginásio PowerFit',telefone:'+351 913 222 333',origem:'Instagram',espaco:'Ginásio',equipamento:'Ultra Detox H₂',estado:'proposta',valor:2500},
  {nome:'Clínica Bem-Estar',telefone:'+351 914 444 555',email:'geral@clinica.pt',origem:'Indicação',espaco:'Clínica / saúde',equipamento:'ROH2ICE',estado:'ganho',valor:1800},
];
  for(const d of demo){ await DB.add(d); } toast('3 leads adicionados'); await load(); go('pipeline'); }

// ---------- boot ----------
document.querySelectorAll('.navb').forEach(b=>b.onclick=()=>go(b.dataset.nav));
document.getElementById('fab').onclick=newLead;
DB.init(); load().then(()=>{ go('pipeline'); });
</script>
